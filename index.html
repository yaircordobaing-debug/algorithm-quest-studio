<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Quest Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- DASHBOARD VIEW -->
<div id="view-dashboard" class="view active">
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">AQ</div>
      <div class="logo-text">Algorithm<br><span>Quest Studio</span></div>
    </div>
    <nav>
      <p class="nav-label">CATEGORÍAS</p>
      <button class="nav-btn active" data-cat="search">🔍 Búsqueda</button>
      <button class="nav-btn" data-cat="sort">↕ Ordenamiento</button>
      <button class="nav-btn" data-cat="graph">🕸 Grafos</button>
      <button class="nav-btn" data-cat="ml">🤖 Machine Learning</button>
      <button class="nav-btn" data-cat="opt">⚙ Optimización</button>
      <button class="nav-btn" data-cat="crypto">🔐 Criptografía</button>
    </nav>
    <div class="sidebar-footer">
      <div class="progress-label">Progreso de aprendizaje</div>
      <div class="progress-bar"><div class="progress-fill" style="width:8%"></div></div>
      <div class="progress-text">2 / 25 algoritmos</div>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="dash-header">
      <div>
        <h1 id="cat-title">Algoritmos de Búsqueda</h1>
        <p id="cat-subtitle">Técnicas para localizar elementos en estructuras de datos</p>
      </div>
    </header>
    <div id="cards-grid" class="cards-grid"></div>
  </main>
</div>

<!-- EXPLORER VIEW (Studio Split-Screen) -->
<div id="view-explorer" class="view">
  <!-- 📘 Intro Theory Modal -->
  <div id="intro-modal" class="intro-overlay">
    <div class="intro-box glassmorphism">
      <button id="intro-close" class="close-x">&times;</button>
      <div id="intro-content"></div>
      <div class="intro-footer">
        <button id="intro-start" class="ctrl-btn primary-glow">Entendido, ¡Simular Ahora! 🚀</button>
      </div>
    </div>
  </div>

  <div class="explorer-wrap">
    <header class="explorer-bar">
      <button id="btn-back" class="nav-back-btn">← Dashboard</button>
      <div class="explorer-breadcrumb" id="exp-breadcrumb">Búsqueda > Linear Search</div>
      <div class="exp-bar-right">
        <span id="exp-complexity" class="complexity-chip">O(?)</span>
        <span id="exp-ops" class="ops-chip">0 operaciones</span>
      </div>
    </header>

    <div class="explorer-split">
      <!-- 💻 LEFT: Code Panel -->
      <aside class="split-side split-left">
        <div class="panel-header">
          <h3>💻 Código Fuente</h3>
          <div class="code-controls">
            <select id="select-algo" class="minimal-select"></select>
            <div class="code-tabs">
              <button class="tab-btn active" data-lang="java">Java</button>
              <button class="tab-btn" data-lang="python">Python</button>
              <button class="tab-btn" data-lang="javascript">JS</button>
            </div>
          </div>
        </div>
        <div id="code-display" class="code-display scroll-skin"></div>
      </aside>

      <!-- 🧪 RIGHT: Simulation Studio -->
      <main class="split-side split-right">
        <div class="viz-studio">
          <!-- 🏷️ Floating Narrative HUD (Overlay on Canvas) -->
          <div id="narrative-box" class="narrative-hud glass">
            <p id="narrative-text">Selecciona un valor y presiona ▶ Reproducir.</p>
          </div>

          <!-- 🖼️ Visualizer Area -->
          <div class="viz-container" id="viz-container">
            <div id="ptr-row" class="ptr-row">
              <div id="ptr-low"  class="ptr ptr-l" style="display:none">▼<span>L</span></div>
              <div id="ptr-mid"  class="ptr ptr-m" style="display:none">▼<span>M</span></div>
              <div id="ptr-high" class="ptr ptr-h" style="display:none">▼<span>H</span></div>
            </div>

            <!-- Layered Renderers -->
            <div id="render-array" class="renderer-layer active">
              <div id="chest-row" class="chest-row"></div>
            </div>

            <div id="render-graph" class="renderer-layer">
              <canvas id="graph-canvas" width="600" height="300"></canvas>
            </div>

            <div id="render-cartesian" class="renderer-layer">
              <canvas id="cartesian-canvas" width="600" height="300"></canvas>
            </div>

            <div id="render-tree" class="renderer-layer">
              <canvas id="tree-canvas" width="600" height="300"></canvas>
            </div>

            <div id="render-radix" class="renderer-layer">
              <div id="radix-main-row" class="chest-row-radix"></div>
              <div id="radix-buckets" class="radix-buckets-container"></div>
            </div>

            <div id="render-board" class="renderer-layer">
              <div id="board-grid" class="board-grid"></div>
            </div>
          </div>

          <!-- 🎛️ Playback Controls (Sticky at bottom) -->
          <div class="playback-bar glass">
            <div class="data-input-group">
              <div class="sub-input">
                <label>Datos:</label>
                <div class="input-flex">
                  <input id="input-data" type="text" value="4, 8, 15, 16, 23, 42" class="neo-input">
                  <button id="btn-shuffle" class="icon-btn" title="Shuffle">🎲</button>
                </div>
              </div>
              <div class="sub-input" id="search-target-wrap">
                <label>Objetivo:</label>
                <input id="input-target" type="number" value="42" class="neo-input target-w">
              </div>
            </div>

            <div class="playback-controls">
              <button id="btn-prev"  class="p-btn secondary" disabled>⏮</button>
              <button id="btn-play"  class="p-btn primary-glow">▶</button>
              <button id="btn-next"  class="p-btn secondary" disabled>⏭</button>
              <button id="btn-reset" class="p-btn secondary">↺</button>
            </div>

            <div class="playback-speed">
              <label>Velocidad:</label>
              <input type="range" id="speed-slider" min="1" max="5" value="3" class="neo-range">
            </div>

            <div class="playback-info">
              Paso <span id="step-idx">0</span>/<span id="step-tot">0</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<script src="js/data/snippets.js"></script>
<script src="js/data/algorithms_metadata.js"></script>
<script src="js/algorithms/algorithm_engine.js"></script>
<script src="js/ui/visualizer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
